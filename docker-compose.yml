services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: kloset-mongodb
    restart: unless-stopped
    # --quiet suppresses INFO-level lifecycle messages.
    # The WiredTiger config string silences the WTRECOV / WTCHKPT / WTEVICT
    # verbose output that otherwise floods the terminal on startup/shutdown.
    command:
      - mongod
      - --quiet
      - --wiredTigerEngineConfigString
      - "verbose=(recovery_progress:0,checkpoint_progress:0,compact:0,eviction:0)"
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-kloset_dev}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - kloset-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Go Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kloset-api
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # Server Configuration
      PORT: 8080
      ENV: ${ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}

      # MongoDB Configuration
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongodb:27017/
      MONGODB_DATABASE: ${MONGODB_DATABASE:-kloset_dev}

      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7}

      # Cloudinary Configuration (optional)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}

      # CORS Configuration
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}

      # Rate Limiting
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-15m}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}

      # File Upload
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    volumes:
      - .:/app
      - /app/bin
    networks:
      - kloset-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/products"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MongoDB Express (Web UI for MongoDB) - Optional but useful for development
  mongo-express:
    image: mongo-express:latest
    container_name: kloset-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-password}
    networks:
      - kloset-network
    profiles:
      - dev

networks:
  kloset-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
